kind = "web"
previewPath = "/"
title = "KKNTK 20 UNIVERSITAS BOJONEGORO 2026
version = "1.0.0"
id = "artifacts/kkn-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21800

[services.development]
run = "pnpm --filter @workspace/kkn-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kkn-website", "run", "build" ]
publicDir = "artifacts/kkn-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21800"
BASE_PATH = "/"
